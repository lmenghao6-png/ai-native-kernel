name: Build AegisOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Linux Distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "v$(tr -d '[:space:]' < VERSION)" = "$GITHUB_REF_NAME"

      - name: Run Python and policy tests
        run: make test-python

  build-distro:
    name: Build and Install AegisOS
    runs-on: ubuntu-24.04
    needs: test
    env:
      AEGISOS_RELEASE_PUBLIC_KEY_B64: ${{ secrets.AEGISOS_RELEASE_PUBLIC_KEY_B64 }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debian-archive-keyring mmdebstrap squashfs-tools grub-pc-bin \
            grub-efi-amd64-bin xorriso mtools parted dosfstools rsync expect \
            qemu-system-x86 qemu-utils ovmf

      - name: Require release trust anchor
        if: startsWith(github.ref, 'refs/tags/v')
        run: test -n "$AEGISOS_RELEASE_PUBLIC_KEY_B64"

      - name: Cache bundled model and runtime
        uses: actions/cache@v5
        with:
          path: build/aegisos/downloads
          key: aegisos-local-model-${{ hashFiles('tools/install-local-model.sh') }}

      - name: Build rootfs and ISO
        run: |
          set -o pipefail
          bash tools/build-aegisos-rootfs.sh 2>&1 | tail -30
          bash tools/build-aegisos-image.sh

      - name: Verify image checksums
        run: (cd build/aegisos/image && sha256sum --check SHA256SUMS)

      - name: QEMU ISO boot test
        run: expect tools/test-aegisos-iso.exp

      - name: QEMU install and reboot test
        run: expect tools/test-aegisos-install.exp

      - name: Build signed application update
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          AEGISOS_RELEASE_PRIVATE_KEY: ${{ secrets.AEGISOS_RELEASE_PRIVATE_KEY }}
        run: |
          test -n "$AEGISOS_RELEASE_PRIVATE_KEY"
          printf '%s' "$AEGISOS_RELEASE_PRIVATE_KEY" | gpg --batch --import
          signing_key="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "sec" { print $5; exit }')"
          test -n "$signing_key"
          AEGISOS_SIGNING_KEY="$signing_key" bash tools/build-release-bundle.sh
          gpg --batch --yes --local-user "$signing_key" \
            --output build/aegisos/image/SHA256SUMS.sig \
            --detach-sign build/aegisos/image/SHA256SUMS
          gpg --batch --yes --local-user "$signing_key" \
            --output build/aegisos/image/release-manifest.json.sig \
            --detach-sign build/aegisos/image/release-manifest.json

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: aegisos-linux-iso
          path: |
            build/aegisos/image/aegisos-*.iso
            build/aegisos/image/SHA256SUMS
            build/aegisos/image/release-manifest.json
            build/aegisos/image/*.sig
            build/aegisos/update/*
            build/aegisos/iso-boot-test.log
            build/aegisos/install-test.log

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-distro
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: aegisos-linux-iso
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/image/aegisos-*.iso
            release/image/SHA256SUMS
            release/image/release-manifest.json
            release/image/*.sig
            release/update/*
          fail_on_unmatched_files: true
          body: |
            AegisOS ${{ github.ref_name }}

            Debian-based AI Linux distribution with a root-capable autonomous
            agent, Guardian monitoring, guided installation, audit logging,
            signed application updates, backup, and rollback.
