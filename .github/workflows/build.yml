name: Build AegisOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-bastion:
    name: Build Bastion Kernel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang lld llvm make git cpio

      - name: Run Python tests
        run: make test-python

      - name: Build Bastion kernel
        run: |
          make all -j$(nproc)
          ls -lh build/aikernel.elf
          ls -lh build/initramfs.cpio

      - name: QEMU boot test
        run: |
          sudo apt-get install -y -qq qemu-system-x86 ovmf
          make fat
          bash tools/test-bastion-boot.sh

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-kernel
          path: |
            build/aikernel.elf
            build/initramfs.cpio
            build/bastion-boot.log

  build-distro:
    name: Build AegisOS Distribution
    runs-on: ubuntu-24.04
    needs: build-bastion
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debian-archive-keyring mmdebstrap squashfs-tools grub-pc-bin \
            grub-efi-amd64-bin xorriso mtools parted dosfstools rsync expect

      - name: Build rootfs
        run: |
          sudo bash tools/build-aegisos-rootfs.sh 2>&1 | tail -20

      - name: Build ISO
        run: |
          bash tools/build-aegisos-image.sh

      - name: QEMU ISO boot test
        run: |
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils ovmf
          expect tools/test-aegisos-iso.exp

      - name: QEMU install and reboot test
        run: expect tools/test-aegisos-install.exp

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegisos-beta-iso
          path: |
            build/aegisos/image/aegisos-beta.iso
            build/aegisos/iso-boot-test.log
            build/aegisos/install-test.log

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-bastion, build-distro]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aegisos-beta-iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aegisos-beta.iso
          body: |
            AegisOS ${{ github.ref_name }}
            
            ## What's included
            - AI Console with OpenAI-compatible API support
            - Agent Framework (5 sensors + 3 actors)
            - Bastion v0.3 kernel (VFS + initramfs + ELF loader)
            - Guided installer
            - Development tools (git, gcc, make, vim, htop)
            
            ## Quick start
            1. Write ISO to USB: `dd if=aegisos-beta.iso of=/dev/sdX bs=4M`
            2. Boot in UEFI mode
            3. Select "Install AegisOS to Disk" in GRUB
            4. Reboot → AI Console auto-starts
